<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>族谱</title>
    <link rel="stylesheet" href="styles.css?v=pan1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">族谱 · 家乘 · 世系</p>
        </div>
        <div class="hero-actions">
          <div class="moon-menu">
            <button id="moonMenuBtn" class="moon-button mirror-button" type="button" aria-expanded="false" aria-label="数据菜单">
              <span class="mirror-face" aria-hidden="true">
                <span class="mirror-moon"></span>
              </span>
            </button>
            <div id="moonMenuPanel" class="moon-panel" hidden>
              <button id="exportBtn" type="button">导出 JSON</button>
              <label class="file-button">
                导入 JSON
                <input id="importInput" type="file" accept="application/json" />
              </label>
              <button id="exportTreeBtn" type="button">导出族谱 SVG</button>
              <label class="menu-field">
                字体
                <select id="fontInput">
                  <option value="serif">宋体</option>
                  <option value="kai">楷体</option>
                  <option value="sans">黑体</option>
                </select>
              </label>
              <button id="resetBtn" class="ghost" type="button">清空族谱</button>
            </div>
          </div>
        </div>
      </section>

      <section class="layout">
        <section class="content">
          <div class="section-head">
            <div>
              <h2>分层世系图</h2>
              <p id="summaryText">尚无族人</p>
            </div>
            <div class="section-actions">
              <div class="mode-switch" aria-label="模式切换">
                <button id="viewModeBtn" class="mode-button active" type="button">查看</button>
                <button id="editModeBtn" class="mode-button" type="button">编辑</button>
              </div>
              <button id="expandAllBtn" class="ghost" type="button">展开全部</button>
              <button id="collapseAllBtn" class="ghost" type="button">收起全部</button>
              <button id="addRootBtn" class="edit-only" type="button">新增族人</button>
            </div>
          </div>
          <div class="tree-panel">
            <div class="tree-tools">
              <label class="talisman-counter">
                <span>符种总数</span>
                <input id="talismanTotalInput" type="number" min="0" value="0" />
                <b id="talismanAliveCount">在世 0</b>
              </label>
              <div class="search-wrap" aria-label="搜索族人">
                <span>查</span>
                <input id="searchInput" type="search" placeholder="姓名、在世符种" />
              </div>
              <div class="zoom-controls" aria-label="缩放控制">
                <button id="zoomOutBtn" type="button" aria-label="缩小">-</button>
                <b id="zoomLabel">100%</b>
                <button id="zoomInBtn" type="button" aria-label="放大">+</button>
                <button id="zoomResetBtn" type="button" aria-label="重置缩放">1:1</button>
              </div>
            </div>
            <div id="treeView" class="tree-view" aria-live="polite"></div>
          </div>
        </section>
      </section>

      <dialog id="memberDialog">
        <form id="memberForm" method="dialog" class="dialog-card member-dialog-card">
          <div class="panel-head">
            <h2 id="memberDialogTitle">新增族人</h2>
            <button id="closeMemberBtn" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <input type="hidden" id="editingId" />
          <label>
            姓名
            <input id="nameInput" required placeholder="如：李通玄" />
          </label>
          <label>
            性别
            <select id="genderInput">
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </label>
          <div class="two-col">
            <label>
              世代
              <input id="generationInput" type="number" min="1" value="1" />
            </label>
            <label>
              同层序号
              <input id="siblingOrderInput" class="order-input" type="number" min="1" value="1" />
            </label>
          </div>
          <div class="two-col">
            <label>
              父亲
              <select id="fatherInput">
                <option value="">未记录</option>
              </select>
            </label>
            <label>
              母亲
              <select id="motherInput">
                <option value="">未记录</option>
              </select>
            </label>
          </div>
          <label>
            母系分组
            <input id="motherGroupInput" placeholder="母亲未知时填写，如：一、二、某妾夫名" />
          </label>
          <label>
            出身
            <select id="birthStatusInput">
              <option value="">按父母婚配自动判断</option>
              <option value="legitimate">嫡出</option>
              <option value="shu">庶出</option>
              <option value="matrilocal">入赘支</option>
              <option value="unknown">嫡庶未明</option>
            </select>
          </label>
          <div class="two-col">
            <label>
              承嗣人
              <select id="adoptiveParentInput">
                <option value="">无</option>
              </select>
            </label>
            <label>
              承嗣类型
              <select id="adoptionTypeInput">
                <option value="">未记</option>
                <option value="heir">嗣子</option>
                <option value="jiao">兼祧</option>
                <option value="out">出继</option>
              </select>
            </label>
          </div>
          <label>
            承嗣备注
            <input id="adoptionNoteInput" placeholder="如：由三房过继入长房" />
          </label>
          <div class="two-col">
            <label>
              生死
              <select id="lifeStatusInput">
                <option value="alive">生</option>
                <option value="dead">死</option>
              </select>
            </label>
            <label>
              级别
              <select id="deathRankInput">
                <option value="凡人">凡人</option>
                <option value="胎息">胎息</option>
                <option value="练气">练气</option>
                <option value="筑基">筑基</option>
                <option value="紫府">紫府</option>
                <option value="金丹">金丹</option>
                <option value="道胎">道胎</option>
                <option value="仙人">仙人</option>
              </select>
            </label>
          </div>
          <label>
            死因
            <input id="deathCauseInput" placeholder="如：病逝、战殁、卒于任上" />
          </label>
          <label>
            字
            <input id="styleInput" placeholder="可选" />
          </label>
          <label>
            符种
            <select id="talismanSeedInput">
              <option value="">未记</option>
              <option value="yes">是</option>
              <option value="no">否</option>
            </select>
          </label>
          <div class="two-col">
            <label>
              箓气等级
              <select id="luqiInput">
                <option value="">未记</option>
                <option value="练气">练气</option>
                <option value="筑基">筑基</option>
                <option value="紫府">紫府</option>
                <option value="金丹">金丹</option>
              </select>
            </label>
            <label>
              箓气内容
              <input id="luqiTextInput" placeholder="如：青尺、月阙、玄炉" />
            </label>
          </div>
          <label>
            神通
            <input id="shentongInput" placeholder="可选" />
          </label>
          <label>
            金性
            <input id="jinxingInput" placeholder="可选" />
          </label>
          <label>
            仙基
            <input id="xianjiInput" placeholder="可选" />
          </label>
          <label>
            备注
            <textarea id="notesInput" rows="3" placeholder="籍贯、官职、生卒年、迁徙等"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit">保存族人</button>
            <button id="cancelEditBtn" class="ghost" type="button">取消</button>
          </div>
        </form>
      </dialog>

      <dialog id="externalChildrenDialog">
        <form id="externalChildrenForm" method="dialog" class="dialog-card">
          <div class="panel-head">
            <h2 id="externalChildrenTitle">外嫁子嗣</h2>
            <button id="closeExternalChildrenBtn" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <input type="hidden" id="externalChildrenMemberId" />
          <label>
            外嫁子嗣
            <textarea id="externalChildrenInput" rows="3" placeholder="只记录姓名，不进入家族树，如：周怀远、周怀瑾"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit">保存</button>
            <button id="cancelExternalChildrenBtn" class="ghost" type="button">取消</button>
          </div>
        </form>
      </dialog>

      <dialog id="deleteDialog">
        <form id="deleteForm" method="dialog" class="dialog-card delete-dialog-card">
          <div class="panel-head">
            <h2 id="deleteDialogTitle">删除族人</h2>
            <button id="closeDeleteBtn" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <input type="hidden" id="deleteKindInput" />
          <input type="hidden" id="deleteMemberId" />
          <p id="deleteMessage" class="dialog-message"></p>
          <div id="deleteWarning" class="warning-box">相关婚配会一并移除，子女的父母记录会清空。</div>
          <div class="form-actions">
            <button class="danger-fill-button" type="submit">确认删除</button>
            <button id="cancelDeleteBtn" class="ghost" type="button">取消</button>
          </div>
        </form>
      </dialog>

      <dialog id="marriageDialog">
        <form id="marriageForm" method="dialog" class="dialog-card">
          <div class="panel-head">
            <h2>登记婚配</h2>
            <button id="closeMarriageBtn" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <input type="hidden" id="marriageIdInput" />
          <label>
            已有男方
            <select id="husbandInput"></select>
          </label>
          <label>
            新男方姓名
            <input id="newHusbandInput" placeholder="用于登记入赘夫婿" />
          </label>
          <label>
            已有女方
            <select id="wifeInput"></select>
          </label>
          <label>
            新女方姓名
            <input id="newWifeInput" placeholder="用于直接新增妻妾" />
          </label>
          <label>
            婚入方式
            <select id="residenceInput">
              <option value="patrilocal">女方嫁入男方家</option>
              <option value="matrilocal">男方入赘女方家</option>
            </select>
          </label>
          <label>
            女方身份
            <select id="spouseRoleInput">
              <option value="principal">正妻</option>
              <option value="successor">继妻</option>
              <option value="concubine">妾</option>
            </select>
          </label>
          <label>
            婚配状态
            <select id="marriageStatusInput">
              <option value="current">在室</option>
              <option value="deceased">已故</option>
              <option value="divorced">和离</option>
            </select>
          </label>
          <label>
            婚配备注
            <input id="marriageNotesInput" placeholder="如：继室、侧室、某年入门" />
          </label>
          <button type="submit">保存婚配</button>
        </form>
      </dialog>
    </main>

    <script src="app.js?v=pan2"></script>
  </body>
</html>
